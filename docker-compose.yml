services:
  webhavnagar:
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webhavnagar.rule=Host(`webhavnagar.com`) || Host(`www.webhavnagar.com`)"
      - "traefik.http.routers.webhavnagar.entrypoints=web"
      - "traefik.http.services.webhavnagar.loadbalancer.server.port=80"
      - "traefik.http.routers.webhavnagar-https.rule=Host(`webhavnagar.com`) || Host(`www.webhavnagar.com`)"
      - "traefik.http.routers.webhavnagar-https.entrypoints=websecure"
      - "traefik.http.routers.webhavnagar-https.tls=true"
      - "traefik.http.routers.webhavnagar-https.tls.certResolver=myresolver"
    volumes:
      - /var/www/html/webhavnagar.com/out:/usr/share/nginx/html:ro
    expose:
      - "80"

networks:
  web:
    external: true